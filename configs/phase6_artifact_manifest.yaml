manifest_version: "1.0"
phase: "6B"
scope: "governed_agentic_research_workflow"
generated_for: "phase6_research_committee_packet"
research_only: true
human_review_required: true
forbidden_default: true

policy:
  description: "Explicit file-level allowlist for Phase 6 research packet inputs."
  no_directory_wide_trust: true
  no_live_web_or_api_refresh: true
  no_broker_or_order_routing_access: true
  no_portfolio_recommendation_authority: true
  arbitrary_filesystem_paths_allowed: false
  allowed_parsers:
    - csv
    - parquet
    - markdown
    - pdf
    - json
    - image_metadata_only
  allowed_uses:
    - backtest_metrics_summary
    - regime_signal_summary
    - pca_dashboard_summary
    - historical_experiment_context
    - governance_context
    - validation_context
    - design_context
    - evidence_inventory
  canonicality_values:
    - canonical
    - diagnostic
    - historical
    - auxiliary

excluded_surfaces:
  - path: ".env"
    reason: "Credentials and local secrets are forbidden inputs."
  - path: ".claude/"
    reason: "Private development and tool state is outside the research evidence surface."
  - path: ".venv/"
    reason: "Local environment dependencies are not research artifacts."
  - path: "data/cache/llm/*.json"
    reason: "Raw LLM cache files are forbidden inputs."
  - path: "notebooks/.ipynb_checkpoints/"
    reason: "Notebook checkpoint files are not reviewed artifacts."
  - path: "notebooks/_rl_dev/"
    reason: "Private development notebooks are outside the approved read surface."
  - path: "results/rl/**/agent_seed_*.pt"
    reason: "Model weights and checkpoint files are forbidden inputs."
  - path: "__pycache__"
    reason: "Python bytecode caches are not research artifacts."
  - path: ".pytest_cache"
    reason: "Test runner cache is not a research artifact."
  - path: "arbitrary filesystem paths not listed in approved_artifacts"
    reason: "Phase 6 uses explicit allowlisting only."

approved_artifacts:
  - artifact_id: data_published_readme
    path: data/published/README.md
    artifact_type: published_data_documentation
    parser: markdown
    role: Documents the published deterministic data surface.
    allowed_use: evidence_inventory
    canonicality: canonical
    research_only: true
    human_review_required: true
    caveats: "Documentation only; does not refresh or validate source data."
  - artifact_id: data_published_full_comparison_with_rl
    path: data/published/full_comparison_with_rl.csv
    artifact_type: published_comparison_table
